<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PB — Dan's Arcade</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
    }
    nav {
      position: fixed;
      top: 0; width: 100%;
      background: #1a1a24;
      padding: 16px 40px;
      display: flex;
      gap: 32px;
      justify-content: center;
      border-bottom: 1px solid #2a2a3a;
      flex-wrap: wrap;
    }
    nav a {
      color: #c9a84c;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom: 2px solid #7dd3fc; padding-bottom: 2px; }
    header { text-align: center; margin-bottom: 48px; }
    header h1 {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, #e8d5a3, #c9a84c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { margin-top: 10px; font-size: 14px; color: #666; letter-spacing: 2px; text-transform: uppercase; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 800px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 20px;
      padding: 36px 32px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #c9a84c;
      box-shadow: 0 12px 40px rgba(201,168,76,0.15);
    }
    .card-icon { font-size: 44px; line-height: 1; }
    .card-title { font-size: 22px; font-weight: 600; }
    .card-desc { font-size: 14px; color: #888; line-height: 1.6; }
    footer { margin-top: 56px; font-size: 12px; color: #333; letter-spacing: 1px; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="active">Home</a>
    <a href="about.html">About</a>
    <a href="pickleball/index.html">Pickleball</a>
  </nav>

  <header>
    <h1>Dan's Arcade</h1>
    <p>Some cool apps for Pickleball addicts</p>
  </header>

  <div class="grid">
    <a class="card" href="pickleball/index.html">
      <div class="card-icon">🏓</div>
      <div class="card-title">Pickleball</div>
      <div class="card-desc">Shot trainer and 10 animated drills — dinking, drops, resets, footwork, and more.</div>
    </a>

    <a class="card" href="about.html">
      <div class="card-icon">👤</div>
      <div class="card-title">About</div>
      <div class="card-desc">Who built this and why.</div>
    </a>
  </div>

  <footer>PB &mdash; Dan's Arcade</footer>
</body>
</html>
